"$schema" = 'https://starship.rs/config-schema.json'

# Starship prompt. Requires a Nerd Font.
# Palette matches the Ghostty theme (Catppuccin Mocha) for a consistent look.
# palette = "catppuccin_mocha"
add_newline = true

format = """
$os\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

right_format = """
$kubernetes\
$terraform\
$aws\
$gcloud"""

[os]
disabled = false
style = "fg:blue"
[os.symbols]
Macos = " "
Ubuntu = " "
Linux = " "

[directory]
style = "bold blue"
truncation_length = 4
truncate_to_repo = true
read_only = " "
format = "[$path]($style)[$read_only](red) "

[git_branch]
symbol = " "
style = "mauve"
# No "on " prefix, single space before the branch — fixes the double gap.
format = "[$symbol$branch]($style) "

[git_status]
style = "peach"
format = '([\[$all_status$ahead_behind\]]($style) )'

[cmd_duration]
min_time = 2000
style = "yellow"
format = "[ $duration]($style) "

[kubernetes]
disabled = false
symbol = "☸ "
style = "sky"
format = '[$symbol$context( \($namespace\))]($style) '

[terraform]
style = "mauve"
format = "[$symbol$workspace]($style) "

[aws]
style = "peach"
format = "[$symbol$profile]($style) "

[gcloud]
style = "blue"
format = "[$symbol$project]($style) "

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

# ── Catppuccin Mocha palette ────────────────────────────────────────
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
overlay0 = "#6c7086"
surface0 = "#313244"
base = "#1e1e2e"
