#:schema https://mise.jdx.dev/schema/mise.json
#
# mise — cross-platform CLI tool + runtime manager.
# This is the GLOBAL machine config (macOS + WSL/Ubuntu share it verbatim).
# Per-project versions live in each project's own mise.toml and override these.
#
# Tool names resolve through the mise registry (https://mise.jdx.dev/registry.html).
# Apply:  mise install        (run automatically by chezmoi)

[tools]
# ── languages / runtimes ────────────────────────────────────────────
node    = "lts"
python  = "3.14"
rust    = "stable"
# php stays on Homebrew (macOS) — see Brewfile.

# ── package / project tooling ───────────────────────────────────────
chezmoi = "latest"   # dotfile manager (bootstrap installs it; mise keeps it current)
uv      = "latest"   # python package/runtime manager
pnpm    = "latest"
just    = "latest"   # task runner
hk      = "latest"   # git hook manager (this repo's hooks)
neovim  = "latest"   # $EDITOR

# ── shell experience ────────────────────────────────────────────────
starship = "latest"  # prompt
eza      = "latest"  # ls replacement
bat      = "latest"  # cat replacement
fzf      = "latest"  # fuzzy finder
zoxide   = "latest"  # smarter cd
# (per-directory env is handled by mise's own [env] support — no direnv)

# ── modern unix CLI (community standard) ────────────────────────────
ripgrep  = "latest"  # rg — grep replacement
fd       = "latest"  # find replacement (also powers fzf below)
jq       = "latest"  # JSON
yq       = "latest"  # YAML/JSON

# ── git / dev ───────────────────────────────────────────────────────
gh       = "latest"  # GitHub CLI
lazygit  = "latest"  # git TUI
delta    = "latest"  # git diff pager (wired into ~/.config/git/config)

# ── kubernetes / cloud-native ───────────────────────────────────────
kubectl    = "latest"
k9s        = "latest"
kind       = "latest"
helm       = "latest"
argocd     = "latest"
trivy      = "latest"
cosign     = "latest"
lazydocker = "latest"

# ── infrastructure as code ──────────────────────────────────────────
terraform = "latest"

# ── extras (explicit backends; uncomment as needed) ─────────────────
# These aren't single-word registry entries — they use aqua/npm/pipx backends.
# Verify the backend path before enabling (mise will tell you if it can't resolve).
# "aqua:argoproj/argo-rollouts"   = "latest"   # provides kubectl-argo-rollouts
# "aqua:F1bonacc1/process-compose" = "latest"
# "pipx:dbt-core"                  = "latest"   # or use Homebrew on macOS
# "aqua:Infisical/infisical"       = "latest"

[settings]
# Trust this config without an interactive prompt on first run.
# (chezmoi applies it to a known-good location.)
experimental = true
