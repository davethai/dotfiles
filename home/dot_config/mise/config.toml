#:schema https://mise.jdx.dev/schema/mise.json
#
# mise — GLOBAL CLI toolchain (macOS + WSL share it). These are the CORE tools,
# installed under every profile. Heavy/devops tools live in conf.d/devops.toml
# and only apply when profile = "full". Per-project versions go in the project's
# own mise.toml and override these.

[tools]
# ── languages / runtimes ────────────────────────────────────────────
node   = "lts"
python = "3.14"
uv     = "latest"   # python package/runtime manager
# php + composer via Laravel Herd on macOS — see Brewfile + docs/how-to/php-laravel.md

# ── tooling ─────────────────────────────────────────────────────────
chezmoi = "latest"  # dotfile manager
neovim  = "latest"  # $EDITOR

# ── shell experience ────────────────────────────────────────────────
starship = "latest"  # prompt
eza      = "latest"  # ls replacement
bat      = "latest"  # cat replacement
fzf      = "latest"  # fuzzy finder
zoxide   = "latest"  # smarter cd

# ── modern unix CLI ─────────────────────────────────────────────────
ripgrep = "latest"   # rg
fd      = "latest"   # find replacement (powers fzf)
jq      = "latest"   # JSON
yq      = "latest"   # YAML/JSON

# ── git ─────────────────────────────────────────────────────────────
gh      = "latest"   # GitHub CLI
lazygit = "latest"   # git TUI
delta   = "latest"   # git diff pager (wired into ~/.config/git/config)

[settings]
# Trust this config without an interactive prompt on first run.
experimental = true
